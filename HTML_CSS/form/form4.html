<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complex Form</title>
  <style>
    /* Global page styles */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 10px;
      margin: 0;
    }

    h2 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }

    form {
      width: 100%;
      max-width: 600px;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    fieldset {
      border: 2px solid #5563DE;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    legend {
      padding: 0 6px;
      color: #5563DE;
      font-size: 22px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #5563DE;
      box-shadow: 0 0 0 3px rgba(85, 99, 222, 0.15);
      outline: none;
    }

    /* Group radio buttons horizontally */
    .radio-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="radio"],
    input[type="checkbox"] {
      accent-color: #5563DE;
      margin-right: 4px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Submit button */
    input[type="submit"] {
      background: #5563DE;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
      width: 150px;
      align-self: flex-start;
    }

    input[type="submit"]:hover {
      background: #3942a3;
      transform: translateY(-2px);
    }

    @media (max-width: 500px) {
      form {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <h2><u>Complex Form</u></h2>
  <form>
    <fieldset>
      <legend>Personal Information</legend>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="emailID">Email:</label>
      <input type="email" id="emailID" name="emailID" required>

      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone">

      <label for="DOB">Date Of Birth:</label>
      <input type="date" name="DOB" id="DOB">

      <div class="radio-group">
        <span>Gender:</span>
        <label><input type="radio" id="male" name="gender" value="male"> Male</label>
        <label><input type="radio" id="female" name="gender" value="female"> Female</label>
      </div>

      <label for="country">Country:</label>
      <select name="country" id="country">
        <option value="">--Choose--</option>
        <option value="India">India</option>
        <option value="England">England</option>
        <option value="UAE">UAE</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Address</legend>
      <label for="street">Street:</label>
      <input type="text" name="street" id="street">

      <label for="city">City:</label>
      <input type="text" name="city" id="city">

      <label for="state">State:</label>
      <input type="text" name="state" id="state">

      <label for="code">Zip code:</label>
      <input type="text" name="code" id="code">
    </fieldset>

    <fieldset>
      <legend>Other Information</legend>
      <label for="textarea">Comments:</label>
      <textarea name="textarea" id="textarea" cols="40" rows="6" placeholder="Write your comments here..."></textarea>

      <label><input type="checkbox" name="terms" id="terms"> I agree to the terms of service</label>

      <input type="submit" value="Submit">
    </fieldset>
  </form>
</body>
</html>
