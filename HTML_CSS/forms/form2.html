<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h2>Event Registration</h2>
        <label for="name">Name :</label>
        <input type="text" name="name" id="name" placeholder="enter your name....">
        <br>
        <br>
        <label for="email">email :</label>
        <input type="email" name="email" id="email" placeholder="enter your email..">
        <br>
        <br>
        <label for="phone">phone :</label>
        <input type="tel" id="phone" name="phone" placeholder="enter your phone no.">
        <br>
        <br>
        <label for="occupationtype">Occupation :</label>
        <select name="occupationtype" id="occupationtype">
            <option value="student">student</option>
            <option value="professional">professional</option>
            <option value="other">other</option>
        </select>
        <fieldset>
            <legend>Topics of interest</legend>
            <label for="checkbox1">HTML</label>
            <input type="checkbox" name="checkbox" id="checkbox1">
            <label for="checkbox2">CSS</label>
            <input type="checkbox" name="checkbox" id="checkbox2">
            <label for="checkbox3">JavaScript</label>
            <input type="checkbox" name="checkbox" id="checkbox3">
        </fieldset>
        <label for="textarea">Comments :</label>
        <br>
        <textarea name="textarea" id="textarea" cols="30" rows="10" placeholder="enter your comments here.."></textarea>
        <input type="submit" value="register">
    </form>
        
</body>
</html>
