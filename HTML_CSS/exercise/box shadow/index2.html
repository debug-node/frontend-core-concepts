<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: rgb(233, 233, 184);
            border: 2px solid black;
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            background-color: rgb(241, 245, 245);
            border: 2px solid red;
            width: 300px;
            height: 300px;
            margin: 5px;
            padding: 5px;
            box-shadow: 0px 8px 16px red;
        }
        .box:hover{
            background-color: rgb(235, 218, 198);
                        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.914);
        }
        #head1{
            color: rgb(17, 87, 122);
            text-shadow: 2px 3px 3px rgb(6, 37, 114) ;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img id="image" src="logo.svg">
            <h1 id="head1">Welcome To Home</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Id rerum pariatur sunt nihil dolorem neque minima sint ad quidem doloremque!</p>
        </div>
    </div>
</body>
</html>
