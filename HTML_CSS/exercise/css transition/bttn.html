<!DOCTYPE html>
<html>
<head>
  <style>
    .btn {
      padding: 12px 24px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #2ecc71;
    }
  </style>
</head>
<body>
  <button class="btn">Hover Me</button>
</body>
</html>
