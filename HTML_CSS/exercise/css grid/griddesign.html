<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: #1e2556;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 150px);
            gap: 10px;
            width: 600px;
            height: auto;
        }

        .item {
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .header {
            background-color: #4CAF50;;
            grid-column-start: 2;
            grid-column-end: 4;
        }

        .side {
            background-color: #f44336;
            grid-row: 1/span 1;
            grid-column: 4/span 1;
        }

        .sidebar {
            grid-row-start: 1;
            grid-row-end: 4;
            background-color: #4CAF50;
        }

        .box1{
            background-color: #FFC107;
            grid-row: 2/ span 1;
            grid-column: 2/ span 1;
        }
        .box2{
            background-color: #f44336;
            grid-row: 2 / span 1;
            grid-column: 3/ span 1;
        }
        .box3{
            background-color: #f44336;
            grid-row: 3 / span 1;
            grid-column: 2/ span 1;
        }
        .box4{
            background-color: #FFC107;
            grid-row: 3 / span 1;
            grid-column: 3/ span 1;
        }
        .right {
            background-color: #4CAF50;
            grid-row: 2 / span 2;
            grid-column: 4 / 5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item header">Header</div>
        <div class="item side">Side</div>
        <div class="item sidebar">Sidebar</div>
        <div class="item box1">Content1</div>
        <div class="item box2">Content2</div>
        <div class="item box3">Content3</div>
        <div class="item box4">Content4</div>
        <div class="item right ">Right</div>
    </div>
</body>

</html>
