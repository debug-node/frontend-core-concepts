<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>2D Transform Demo</title>
		<style>
			.box {
				width: 100px;
				height: 100px;
				margin: 20px;
				background-color: dodgerblue;
				color: white;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				font-weight: bold;
				transition: transform 0.5s;
			}

			.translate:hover {
				transform: translate(50px, 20px);
			}
			.rotate:hover {
				transform: rotate(45deg);
			}
			.scale:hover {
				transform: scale(1.5);
			}
			.skew:hover {
				transform: skew(20deg, 10deg);
			}
		</style>
	</head>
	<body>
		<h2>Hover to See 2D Transforms</h2>
		<div class="box translate">Translate</div>
		<div class="box rotate">Rotate</div>
		<div class="box scale">Scale</div>
		<div class="box skew">Skew</div>
	</body>
</html>
