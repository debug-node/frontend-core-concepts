<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bookmark manager</title>
		<style>
			h1 {
				background-color: aqua;
			}
			h2 {
				background-color: bisque;
			}
			p {
				font-style: italic;
				font-size: 20px;
				color: rgb(4, 4, 4);
			}
			a {
				padding-left: 10px;
			}
			a:hover {
				color: brown;
			}
			img {
				border: 10px;
				border-radius: 50px;
			}
			article {
				display: inline-block;
				text-align: center;
				font-size: 25px;
				text-decoration: underline;
				background-color: antiquewhite;
			}
		</style>
	</head>

	<body>
		<h1>My bookmarks</h1>
		<h2>Primary Bookmarks</h2>
		<p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Minus, ullam?</p>
		<!-- for open in new tab  -->
		<a target="_blank" href="https://www.google.com">Open google</a>
		<h2>secondary Bookmark</h2>
		<a target="_blank" href="https://www.youtube.com">Open youtube</a>
		<br />
		<br />
		<img width="" height="" src="image.jpg" alt="dear image" />
		<article>Bihar is best</article>
	</body>
</html>
