<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moving Car</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #87CEEB; /* Sky blue */
      overflow: hidden;
    }

    .road {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 80px;
      background: #333;
    }

    .car {
      position: absolute;
      bottom: 100px;
      left: -200px;
      width: 200px;
      height: 60px;
      background: red;
      border-radius: 20px 20px 10px 10px;
      animation: moveCar 6s linear infinite;
    }

    .car::before {
      content: "";
      position: absolute;
      top: -30px;
      left: 30px;
      width: 140px;
      height: 30px;
      background: #c00;
      border-radius: 10px;
    }

    .wheel {
      position: absolute;
      bottom: -20px;
      width: 40px;
      height: 40px;
      background: black;
      border-radius: 50%;
      animation: rotateWheel 1s linear infinite;
    }

    .wheel.front {
      left: 20px;
    }

    .wheel.back {
      right: 20px;
    }

    @keyframes moveCar {
      0% {
        left: -200px;
      }
      100% {
        left: 100%;
      }
    }

    @keyframes rotateWheel {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="car">
    <div class="wheel front"></div>
    <div class="wheel back"></div>
  </div>

  <div class="road"></div>

</body>
</html>
