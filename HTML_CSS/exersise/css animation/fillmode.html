<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>animation-fill-mode Example</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background: orange;
      animation: grow 2s forwards;
    }

    @keyframes grow {
      from {
        width: 100px;
      }
      to {
        width: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
