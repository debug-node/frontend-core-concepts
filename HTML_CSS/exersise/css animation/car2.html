<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moving SVG Car</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #87CEEB;
      overflow: hidden;
    }

    .road {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 110px;
      background: #444;
    }

    .car-container {
      position: absolute;
      bottom: 100px;
      width: 200px;
      animation: drive 6s linear infinite;
    }

    @keyframes drive {
      0% {
        left: -220px;
      }
      100% {
        left: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="car-container">
    <!-- Realistic SVG Car -->
    <svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Car body -->
      <rect x="20" y="40" width="160" height="40" fill="#e63946" rx="10" />
      <!-- Car top -->
      <polygon points="60,40 80,20 130,20 150,40" fill="#ff6b6b"/>
      <!-- Windows -->
      <rect x="85" y="25" width="15" height="15" fill="#fff" />
      <rect x="105" y="25" width="15" height="15" fill="#fff" />
      <!-- Wheels -->
      <circle cx="50" cy="85" r="10" fill="#000" />
      <circle cx="150" cy="85" r="10" fill="#000" />
    </svg>
  </div>

  <div class="road"></div>

</body>
</html>
